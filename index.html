<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fish World</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
  body {
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
    color: white;
  }

  /* Moving gradient ocean background */
  .ocean {
    position: fixed;
    width: 100%;
    height: 100%;
    background: linear-gradient(120deg, #003366, #006699, #003366);
    background-size: 300% 300%;
    animation: oceanMove 12s ease infinite;
    z-index: -2;
  }

  @keyframes oceanMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* Interactive fish */
  .fish {
    position: absolute;
    width: 120px;
    transition: transform 0.2s;
    pointer-events: none;
  }

  /* Menu buttons */
  .menu {
    position: fixed;
    top: 20px;
    left: 20px;
    background: rgba(0,0,0,0.4);
    padding: 14px;
    border-radius: 10px;
    backdrop-filter: blur(6px);
  }

  .menu button {
    display: block;
    margin: 6px 0;
    padding: 10px 14px;
    background: #1e90ff;
    border: none;
    border-radius: 6px;
    color: white;
    cursor: pointer;
    font-size: 16px;
  }

  .menu button:hover {
    background: #63b3ff;
  }
</style>
</head>

<body>

<div class="ocean"></div>

<!-- Buttons that open YOUR pages -->
<div class="menu">
  <button onclick="openPage('clownfish.html')">Clownfish</button>
  <button onclick="openPage('shark.html')">Sharks</button>
  <button onclick="openPage('salmon.html')">Salmon</button>
</div>

<!-- Cartoon fish (SVG so they never break) -->
<img src="data:image/svg+xml;utf8,
<svg width='200' height='100' xmlns='http://www.w3.org/2000/svg'>
<ellipse cx='60' cy='50' rx='50' ry='30' fill='orange'/>
<polygon points='110,50 150,30 150,70' fill='orange'/>
<circle cx='40' cy='45' r='6' fill='white'/>
<circle cx='42' cy='45' r='3' fill='black'/>
</svg>" class="fish" id="fish1">

<img src="data:image/svg+xml;utf8,
<svg width='200' height='100' xmlns='http://www.w3.org/2000/svg'>
<ellipse cx='60' cy='50' rx='50' ry='30' fill='yellow'/>
<polygon points='110,50 150,30 150,70' fill='yellow'/>
<circle cx='40' cy='45' r='6' fill='white'/>
<circle cx='42' cy='45' r='3' fill='black'/>
</svg>" class="fish" id="fish2">

<script>
  // Fish follow mouse
  document.addEventListener("mousemove", function(e) {
    fish1.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`;
    fish2.style.transform = `translate(${e.clientX - 150}px, ${e.clientY + 80}px)`;
  });

  // Open your own pages
  function openPage(page) {
    window.open(page, "_blank");
  }
</script>

</body>
</html>
